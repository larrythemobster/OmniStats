name: Feature request
description: Propose a focused improvement for OmniStats.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Keep proposals focused on the official OmniStats project. Do not include private service details, credentials, or personal data.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the player or contributor problem, not only the proposed implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the expected user-visible result and important constraints.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe existing workarounds or other approaches, if any.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Public report safety
      options:
        - label: This proposal does not contain secrets, private service details, or personal data.
          required: true
